<style>
:root{--accent:#5a6b7b;--ink:#1a2432;--muted:#5b6b7d;--line:#e2e8f0;--soft:#f4f6f9;--ok:#1f8a4c;--bad:#c0392b;--gold:#8a6d1e}
*{box-sizing:border-box}
body{font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:var(--ink);line-height:1.5;margin:0;background:#eef1f5}
.wrap{max-width:760px;margin:0 auto;padding:20px 16px 60px}
header{border-bottom:3px solid var(--accent);padding-bottom:10px;margin-bottom:14px}

h1{font-size:1.3rem;margin:.1em 0}
.sub{color:var(--muted);font-size:.9rem}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;margin:14px 0;box-shadow:0 1px 3px rgba(20,40,70,.06)}
.meta{display:flex;justify-content:space-between;color:var(--muted);font-size:.85rem;margin-bottom:8px}

.bar>i{display:block;height:100%;background:var(--accent);width:0;transition:width .25s}
.q{font-weight:600;margin:8px 0 12px;font-size:1.05rem}

.opt:hover{border-color:var(--accent);background:var(--soft)}

@media(prefers-color-scheme:dark){body{background:#0e141c;color:#e6edf5}.card,.opt{background:#161d28;border-color:#2b3646;color:#e6edf5}.opt:hover{background:#1c2531}.exp,.pill,.miss{background:#161d28;color:#c7d3e0}.sub,.muted,.meta{color:#9fb0c2}.opt.correct{background:#12301f;border-color:#2f9e5b}.opt.wrong{background:#331617;border-color:#c0392b}}
</style></head><body><div class="wrap">
<header><div class="waa">WAA &middot; Board Review 2026</div>
<h1>Law Drill: OPTOLAWBOOK</h1>
<div class="sub">38 board items on Optometry Law, Ethics &amp; Jurisprudence, from Cinco's "Legal and Professional Aspects." Answer, read the why, move on.</div></header>

<div id="start" class="card">
<p>Questions and options shuffle each run. Pick a length:</p>
<div class="row">
<button class="btn" onclick="begin(38)">Full (38)</button>
<button class="btn ghost" onclick="begin(20)">Quick (20)</button>
<button class="btn ghost" onclick="begin(10)">Warm-up (10)</button>
</div></div>

<div id="quiz" class="hide"></div>
<div id="result" class="hide"></div>
</div>
<script>
const BANK=[{"q": "What was the first regulatory law governing optometry in the Philippines?", "o": ["The Optometry Law of 1917", "Republic Act 1998", "Republic Act 8050", "Presidential Decree 223"], "a": 0, "e": "The Optometry Law of 1917 was the first regulatory law (written in Spanish, amended 1919). It was later amended by RA 1998 (1957), which was in turn replaced by RA 8050 (1995)."}, {"q": "The 1917 Optometry Law created the examining body originally called the:", "o": ["Board of Optometry", "Junta Examinadora (Board of Examiners)", "Professional Regulation Commission", "Council of Deans"], "a": 1, "e": "The 1917 law created the 'Junta Examinadora' (Board of Examiners). Under PD 223 (amended by PD 657) the 'Board of Examiners in Optometry' was later renamed the 'Board of Optometry.'"}, {"q": "According to PRC records, Registration Certificate No. 1 in optometry was issued on March 11, 1918 to:", "o": ["Dr. Federico Sarabia Sr.", "Dr. Justo Gonzalez", "Dr. Manuel Sabater", "Dr. Claro M. Cinco"], "a": 2, "e": "PRC records show Registration Certificate No. 1 was issued March 11, 1918 to Dr. Manuel Sabater. Federico Sarabia Sr. is often cited as the reputed first and was the first Filipino to study optometry in the US (1905)."}, {"q": "Which school was the first university-affiliated optometry college in the Philippines?", "o": ["Manila Central University", "De Ocampo Memorial College", "Philippine College of Optometry", "Centro Escolar University (1928)"], "a": 3, "e": "Centro Escolar University established the first university-affiliated optometry college in 1928, with Dr. Roy A. Thorson as its first dean."}, {"q": "The 1st Asian-Pacific Optometric Congress (Manila, 1978) founded which organization?", "o": ["IFAPAO", "APCO", "WCO", "IOOL"], "a": 0, "e": "The 1st APOC in Manila (July 1978) founded IFAPAO (International Federation of Asian and Pacific Associations of Optometrists), which later became APCO. Its first president was Dr. Claro M. Cinco."}, {"q": "In 1979 the OAP, PODA, and PROA merged into a single national organization known as:", "o": ["Optometric Association of the Philippines", "Samahan Ng Optometrist Sa Pilipinas (SOP)", "Philippine Association of Optometrists", "Philippine College of Optometrists"], "a": 1, "e": "In 1979, to meet the PRC's requirement of one national association, the OAP, PODA, and PROA merged into the Samahan Ng Optometrist Sa Pilipinas (SOP)."}, {"q": "What is the official short title of Republic Act 8050?", "o": ["The Optometry Law of 1917", "The PRC Modernization Act", "The Revised Optometry Law of 1995", "The Philippine Optometry Act"], "a": 2, "e": "RA 8050 is cited as the 'Revised Optometry Law of 1995.' It repealed RA 1998 and was approved June 7, 1995 by President Fidel V. Ramos."}, {"q": "Under RA 8050, optometry is declared a regular component of what system?", "o": ["The tertiary health care system", "The social security system", "The public education system", "The primary health care system"], "a": 3, "e": "Section 2 (Declaration of State Policy) promotes optometric services as a regular component of the primary health care system."}, {"q": "As originally listed in RA 8050, which set of diagnostic pharmaceutical agents and concentrations is correct?", "o": ["Phenylephrine 2.5%, Tropicamide 0.5%, Proparacaine 0.5%, Oxybuprocaine 0.4%, Fluorescein strips", "Phenylephrine 10%, Tropicamide 1%, Atropine 1%", "Pilocarpine 2%, Timolol 0.5%, Proparacaine 0.5%", "Cyclopentolate 1%, Phenylephrine 2.5%, Tetracaine 0.5%"], "a": 0, "e": "RA 8050 as written lists five DPAs: Phenylephrine 2.5%, Tropicamide 0.5%, Proparacaine 0.5%, Oxybuprocaine HCl 0.4%, and Fluorescein strips. The 2008 IRR later added Cyclopentolate, making the current list six."}, {"q": "Who approves the diagnostic pharmaceutical agents an optometrist may use, and on whose recommendation?", "o": ["The PRC, on the Board's recommendation", "The DOH, on the recommendation of the BFAD", "The CHED, on the Board's recommendation", "The President, on the DOH's recommendation"], "a": 1, "e": "The DPA list is set by the Board of Optometry but is approved by the Secretary of the Department of Health (DOH) on the recommendation of the Bureau of Food and Drugs (BFAD)."}, {"q": "The Board of Optometry is composed of how many members, chosen from how many nominees?", "o": ["3 members from 6 nominees", "7 members from 14 nominees", "5 members from 10 nominees", "5 members from 15 nominees"], "a": 2, "e": "Under Sec. 7, the Board has five (5) members appointed by the President from a list of ten (10) nominees submitted by the integrated national organization."}, {"q": "What is the minimum age and minimum years of active practice for a Board of Optometry member?", "o": ["30 years old and 5 years of practice", "40 years old and 10 years of practice", "35 years old and 5 years of practice", "35 years old and 10 years of practice"], "a": 3, "e": "Sec. 8 requires a Board member to be at least 35 years old at appointment and in active practice for at least 10 years prior."}, {"q": "The term of office of a Board of Optometry member is:", "o": ["5 years, non-renewable", "3 years, renewable once", "7 years, non-renewable", "6 years, renewable"], "a": 0, "e": "Sec. 9 provides a five-year, non-renewable term. Terms are staggered so one seat opens each year, and the member in his last year automatically becomes chairperson."}, {"q": "How many Board members constitute a quorum, and how many votes are needed to decide an administrative case?", "o": ["2 for quorum, 3 to decide", "3 for quorum, 3 to decide", "3 for quorum, 4 to decide", "4 for quorum, 3 to decide"], "a": 1, "e": "Sec. 13 sets the quorum at three members, and Sec. 14 requires the vote of three members to render a decision in an administrative case."}, {"q": "To pass the optometry licensure examination, an applicant must obtain:", "o": ["A general average of 70% with none below 50%", "A general average of 80% with none below 60%", "A general average of at least 75% with no grade below 50%", "A general average of 75% with no grade below 60%"], "a": 2, "e": "Sec. 20 requires a general average of at least 75% in all subjects, with no rating below 50% in any single subject."}, {"q": "Under RA 8050, an applicant who fails the board examination a third time must do what before taking it again?", "o": ["Wait one full year", "Re-enroll in the entire O.D. program", "Obtain a special permit from the President", "Submit proof of a refresher course from an accredited institution"], "a": 3, "e": "Sec. 22 requires an applicant who fails a third time to submit proof of a refresher course from a duly accredited institution before the next examination."}, {"q": "A revocation or suspension by the Board of Optometry becomes final unless appealed to the PRC within:", "o": ["15 days", "10 days", "30 days", "60 days"], "a": 0, "e": "Sec. 27 provides that the Board's revocation or suspension becomes final unless appealed to the PRC within 15 days from receipt of the decision."}, {"q": "How often must an optometrist's professional license be renewed under RA 8050?", "o": ["Every year", "Every 3 years", "Every 2 years", "Every 5 years"], "a": 1, "e": "Sec. 29 makes the professional license renewable every three (3) years. Note that Sec. 29's continuing-education-for-renewal requirement was repealed by Sec. 20 of RA 8981 (PRC Modernization Act of 2000)."}, {"q": "What is the penalty under the penal provision (Sec. 33) of RA 8050?", "o": ["6 months to 6 years, or a fine up to P5,000", "2 to 10 years and a fine of P50,000", "1 to 8 years, or a fine of P10,000 to P40,000, or both", "6 years and 1 day to 12 years"], "a": 2, "e": "Sec. 33 imposes imprisonment of not less than 1 year and not more than 8 years, or a fine of P10,000 to P40,000, or both, at the court's discretion, plus applicable administrative penalties."}, {"q": "Which of the following is a PROHIBITED act under Sec. 32 of RA 8050?", "o": ["Displaying your certificate of registration in the clinic", "Referring a patient to an ophthalmologist", "Collecting a professional fee for an eye examination", "Advertising that you charge lower fees or sell cheaper frames than other optometrists"], "a": 3, "e": "Sec. 32 prohibits advertising that one optometrist is better than others or that he collects lower fees or sells cheaper frames or lenses. Comparative and price advertising is a classic prohibited act."}, {"q": "Under Sec. 5 of RA 8050, government-trained public health workers in the blindness-prevention program may perform only:", "o": ["Visual acuity testing and visual screening", "Contact lens fitting", "Refraction and prescription of lenses", "Use of diagnostic pharmaceutical agents"], "a": 0, "e": "The Sec. 5 exemption limits trained public health workers to visual acuity testing and visual screening only; anything beyond that would be unauthorized practice."}, {"q": "A certificate of registration in optometry is signed by:", "o": ["The President and the DOH Secretary", "The PRC Commissioner and all members of the Board of Optometry", "The Board chairperson alone", "The CHED chairperson and the Board secretary"], "a": 1, "e": "Sec. 3(e) defines the certificate of registration as a document signed by the PRC Commissioner and by all members of the Board of Optometry, bearing the official seal."}, {"q": "Under the Code of Ethics, what should the optometrist consider his PRIMARY responsibility?", "o": ["Maximizing professional income", "Advancing his own reputation", "The visual welfare of the public", "Expanding his clientele"], "a": 2, "e": "The first duty in the Code is to consider as his primary responsibility the visual welfare of the public."}, {"q": "Which of the following is considered an UNETHICAL or unprofessional act for an optometrist?", "o": ["Referring a patient for medical attention when indicated", "Keeping patient information confidential", "Continuing professional education", "Employing lay persons to perform the visual examination"], "a": 3, "e": "Employing lay persons to perform the visual examination is expressly listed as unethical. Others include advertising superiority, house-to-house canvassing, and using 'Doctor' without qualifying it with 'optometry.'"}, {"q": "Under the Code of Ethics, when an optometrist uses the title 'Doctor' or 'Dr.,' he must:", "o": ["Qualify it with the word 'optometry' or 'optometrist'", "Use it without any qualification", "Use it only in academic settings", "Avoid it entirely"], "a": 0, "e": "It is unethical to use the title 'Doctor' or 'Dr.' without qualifying it with 'optometry' or 'optometrist,' to avoid misleading the public."}, {"q": "When an optometrist is called in as a consultant on a colleague's patient, it is his responsibility to:", "o": ["Take over the patient permanently", "Return the patient to the original optometrist for subsequent care", "Refer the patient to a physician", "Report the original optometrist to the Board"], "a": 1, "e": "A consultant must ensure the patient is returned to the original (attending) optometrist for any subsequent care the patient needs."}, {"q": "Under the Code of Ethics, an optometrist who discovers a corrupt or dishonest colleague should:", "o": ["Ignore it to preserve collegiality", "Confront the colleague publicly", "Expose the matter to the Board of Optometry", "Report only to the patient"], "a": 2, "e": "The Code obliges the optometrist to expose corrupt or dishonest members to the Board of Optometry, helping safeguard the profession against the unfit."}, {"q": "Which Presidential Decree created the PRC and changed 'Board of Examiners in Optometry' to 'Board of Optometry'?", "o": ["PD 996", "PD 3573", "PD 649", "PD 223 (as amended by PD 657)"], "a": 3, "e": "PD 223 (as amended by PD 657) created the Professional Regulation Commission and renamed the 'Board of Examiners in Optometry' to the 'Board of Optometry.' PD 223 was later repealed by RA 8981."}, {"q": "The Professional Regulation Commission is headed by:", "o": ["One Chairperson and two Commissioners appointed for a 7-year term with no reappointment", "A single Commissioner appointed for life", "Three co-equal Commissioners for 5-year terms", "The Secretary of Health"], "a": 0, "e": "Under RA 8981, the PRC is headed by one full-time Chairperson and two full-time Commissioners, appointed by the President for a seven-year term without reappointment."}, {"q": "The right of the State to regulate the practice of optometry is founded on its:", "o": ["Power of taxation", "Police power", "Power of eminent domain", "Power of judicial review"], "a": 1, "e": "The right to regulate professions rests on the police power of the State (People v. Pomar, 46 Phil. 440; US v. Gomez Jesus, 31 Phil. 218), the power to enact reasonable laws for public welfare, health, morality, and safety."}, {"q": "RA 8981, which reorganized the PRC and repealed PD 223, is known as the:", "o": ["Revised Optometry Law", "Higher Education Act", "PRC Modernization Act of 2000", "Generics Act"], "a": 2, "e": "RA 8981 is the PRC Modernization Act of 2000. Its Sec. 20 also repealed the continuing-education-for-renewal requirement that RA 8050's Sec. 29 had imposed."}, {"q": "The classic Test for Negligence, 'Would a prudent man foresee harm?', comes from which case?", "o": ["People v. Pomar", "Schloendorff v. Society of NY Hospital", "Safian v. Aetna", "Picart v. Smith (37 Phil. 809)"], "a": 3, "e": "Picart v. Smith (37 Phil. 809) states the reasonable/prudent-man test: if a prudent person in the actor's position would foresee harm, the law imposes a duty to take precaution, and failing to do so is negligence."}, {"q": "In defamation, a written imputation is called libel; an oral one is called:", "o": ["Slander", "Perjury", "Malice", "Contempt"], "a": 0, "e": "Under the Revised Penal Code, written defamation is libel (Art. 355) and oral defamation is slander. Elements of defamation: an imputation causing dishonor, malice, and bad faith."}, {"q": "Under Art. 2176 of the Civil Code, fault or negligence causing damage where there is NO pre-existing contract is called a:", "o": ["Breach of contract", "Quasi-delict (tort)", "Criminal felony", "Administrative offense"], "a": 1, "e": "Art. 2176 defines quasi-delict: whoever by act or omission causes damage to another through fault or negligence, with no pre-existing contractual relation, is obliged to pay for the damage done."}, {"q": "The principle that 'every human being of adult years and sound mind has the right to determine what shall be done with his own body' (the basis of informed consent) was stated by Justice Cardozo in:", "o": ["Picart v. Smith", "People v. Wendel", "Schloendorff v. Society of New York Hospital", "Salpa v. Leland Stanford"], "a": 2, "e": "Justice Cardozo articulated the right to self-determination in Schloendorff v. Society of New York Hospital (1914), a foundation of the informed-consent doctrine."}, {"q": "In which situation is a patient's consent NOT required before a procedure?", "o": ["Routine refraction of a competent adult", "Fitting contact lenses on a willing patient", "Any procedure the optometrist judges beneficial", "A genuine emergency where the patient is unconscious, or a procedure the law compels for public health such as immunization"], "a": 3, "e": "Consent is not needed in a true emergency (patient unconscious, no representative available) or where the law compels the procedure for public health, such as compulsory immunization under RA 3573 and PD 996."}, {"q": "If a patient dies or becomes incapacitated, RA-related civil rules say the claim for professional fees may be made, in order, against the:", "o": ["Spouse, then descendant of nearest degree, then ascendant of nearest degree, then brothers and sisters", "Employer, then the government", "Brothers and sisters first, then the spouse", "Nearest optometric society"], "a": 0, "e": "Following the Civil Code support rules (Arts. 290-291), the claim runs in order against the spouse, then the descendant of nearest degree, then the ascendant of nearest degree, then brothers and sisters."}, {"q": "In a suit based on BREACH OF CONTRACT against an optometrist (as opposed to negligence), which statement is TRUE?", "o": ["Expert testimony is always required", "The optometrist is liable only if he specifically stipulated a cure or result and failed, and 'pain and suffering' is not an element", "Pain and suffering is the main element", "The optometrist is automatically liable for any failure to cure"], "a": 1, "e": "Liability for breach of contract requires that the optometrist specifically promised a cure or result and failed. Expert testimony is not required and pain and suffering is not an element. The prudent rule is never to guarantee results."}];
let pool=[],idx=0,score=0,missed=[];
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function begin(n){
  pool=shuffle(BANK).slice(0,n).map(q=>{const opts=shuffle(q.o.map((t,i)=>({t,c:i===q.a})));return {q:q.q,opts,e:q.e}});
  idx=0;score=0;missed=[];
  document.getElementById('start').classList.add('hide');
  document.getElementById('result').classList.add('hide');
  document.getElementById('quiz').classList.remove('hide');
  render();
}
function render(){
  const q=pool[idx];const el=document.getElementById('quiz');
  el.innerHTML=`<div class="card"><div class="meta"><span>Question ${idx+1} of ${pool.length}</span><span>Score ${score}</span></div>
  <div class="bar"><i style="width:${(idx)/pool.length*100}%"></i></div>
  <div class="q">${esc(q.q)}</div><div id="opts"></div>
  <div class="exp" id="exp"></div>
  <div class="row hide" id="next"><button class="btn" onclick="adv()">${idx+1<pool.length?'Next question':'See results'}</button></div></div>`;
  const o=document.getElementById('opts');
  q.opts.forEach((op,i)=>{const b=document.createElement('button');b.className='opt';b.innerHTML=esc(op.t);b.onclick=()=>pick(i,b);o.appendChild(b)});
}
function pick(i,btn){
  const q=pool[idx];const opts=[...document.querySelectorAll('#opts .opt')];
  opts.forEach((b,j)=>{b.disabled=true;if(q.opts[j].c)b.classList.add('correct')});
  if(q.opts[i].c){score++}else{btn.classList.add('wrong');missed.push({q:q.q,right:q.opts.find(x=>x.c).t,e:q.e})}
  const ex=document.getElementById('exp');ex.innerHTML='<b>Why:</b> '+esc(q.e);ex.classList.add('show');
  document.getElementById('next').classList.remove('hide');
}
function adv(){idx++;if(idx<pool.length){render()}else{finish()}}
function finish(){
  document.getElementById('quiz').classList.add('hide');
  const pct=Math.round(score/pool.length*100);
  let html=`<div class="card" style="text-align:center"><div class="pill">${pct>=75?'PASS line cleared':'Keep drilling'}</div>
  <div class="big">${pct}%</div><div class="sub">${score} of ${pool.length} correct</div>
  <div class="row" style="justify-content:center"><button class="btn" onclick="location.reload()">Run again</button></div></div>`;
  if(missed.length){html+='<div class="card"><h3 style="margin-top:0">Review the misses (${missed.length})</h3>'.replace('${missed.length}',missed.length);
    missed.forEach(m=>{html+=`<div class="miss">${esc(m.q)}<br><b>Answer:</b> ${esc(m.right)}<br><span class="muted">${esc(m.e)}</span></div>`});html+='</div>'}
  const r=document.getElementById('result');r.innerHTML=html;r.classList.remove('hide');window.scrollTo(0,0);
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
</script></body></html>
