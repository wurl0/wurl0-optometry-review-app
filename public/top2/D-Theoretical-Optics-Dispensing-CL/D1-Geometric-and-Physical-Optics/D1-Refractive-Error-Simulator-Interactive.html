<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refractive Error Simulator — Interactive (WAA Board Review 2026)</title>
<style>
  :root{--bg:#0f1419;--card:#1a212b;--card2:#222b37;--line:#2d3845;--txt:#e6edf3;--mut:#9fb0c0;
    --accent:#4aa8ff;--ok:#3fb950;--warn:#e3b341;--ray:#ffd479;--retina:#e673b0;--key:#a371f7}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font:16px/1.6 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;padding:0 0 70px}
  header{background:linear-gradient(135deg,#13202f,#0f1419);border-bottom:1px solid var(--line);padding:22px 18px}
  .wrap{max-width:900px;margin:0 auto;padding:0 18px}
  h1{margin:2px 0 0;font-size:21px}
  .brand{font-size:13px;color:var(--accent);font-weight:700;letter-spacing:2px}
  .sub{color:var(--mut);font-size:13px;margin-top:4px}
  h2{font-size:16px;color:var(--warn);border-left:3px solid var(--warn);padding-left:10px;margin:22px 0 8px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin:14px 0}
  .hint{color:var(--mut);font-size:13.5px;margin:2px 0 12px}
  svg{width:100%;height:auto;display:block}
  .btns{display:flex;gap:8px;flex-wrap:wrap}
  .btn{cursor:pointer;border:1px solid var(--line);background:var(--card2);color:var(--txt);border-radius:9px;padding:8px 12px;font-size:13px;transition:.14s}
  .btn:hover{border-color:var(--mut)}
  .btn.on{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent) inset}
  .row{display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-top:10px}
  input[type=range]{accent-color:var(--accent);flex:1;min-width:200px}
  .toggle{display:inline-flex;align-items:center;gap:8px;font-size:14px;cursor:pointer}
  .toggle input{accent-color:var(--ok);width:16px;height:16px}
  .readout{margin:12px 0 0;font-size:14px;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .readout b{color:#fff}
  .stat{display:inline-block;background:#11181f;border:1px solid var(--line);border-radius:7px;padding:3px 9px;margin:3px 6px 3px 0;font-size:13px}
  .stat b{color:var(--accent)}
  .preview{display:flex;gap:24px;align-items:center;justify-content:center;margin-top:8px}
  .E{font-weight:800;font-size:74px;color:#e6edf3;line-height:1;transition:filter .25s}
  .plabel{font-size:12px;color:var(--mut);text-align:center}
  footer{color:var(--mut);font-size:12px;text-align:center;margin-top:30px}
</style>
</head>
<body>
<header><div class="wrap">
  <div class="brand">WAA</div>
  <h1>Refractive Error Simulator</h1>
  <div class="sub">Board Review 2026 · Personal study notes · where do the rays land, and what lens fixes it</div>
</div></header>

<div class="wrap">
  <div class="card">
    <div class="btns" id="modeBtns">
      <div class="btn mode" data-mode="emm">Emmetropia</div>
      <div class="btn mode" data-mode="myopia">Myopia</div>
      <div class="btn mode" data-mode="hyperopia">Hyperopia</div>
      <div class="btn mode" data-mode="astig">Astigmatism</div>
    </div>

    <svg id="eye" viewBox="0 0 640 360" role="img" aria-label="Eye cross-section with rays"></svg>

    <div class="row" id="sliderRow">
      <span style="font-size:13px;color:var(--mut);min-width:96px">Axial length</span>
      <input type="range" id="len" min="-26" max="26" value="0">
      <label class="toggle"><input type="checkbox" id="corr"> Correcting lens</label>
    </div>

    <div class="readout" id="readout"></div>
    <div style="margin-top:10px" id="stats"></div>

    <div class="preview">
      <div><div class="E" id="Eimg">E</div><div class="plabel">image on the retina</div></div>
    </div>
  </div>

  <div class="card" id="teach"></div>

  <footer>WAA · Board Review 2026 · Personal study notes · D1 Geometric Optics — Refractive errors</footer>
</div>

<script>
var SVGNS="http://www.w3.org/2000/svg";
function el(t,a){var e=document.createElementNS(SVGNS,t);for(var k in a)e.setAttribute(k,a[k]);return e;}
var svg=document.getElementById('eye');

// geometry: lens plane at x=170, optical axis y=180, natural focus (emmetropic) at FX0
var LENSX=170, AXIS=180, FX0=470, TOPY=110, BOTY=250;
var mode='emm';

function clear(){while(svg.firstChild)svg.removeChild(svg.firstChild);}

function drawEyeBody(retinaX){
  // globe
  svg.appendChild(el('path',{d:'M150,180 Q150,70 300,70 Q'+(retinaX+30)+',70 '+(retinaX+30)+',180 Q'+(retinaX+30)+',290 300,290 Q150,290 150,180 Z',
    fill:'#16202b',stroke:'#3a4654','stroke-width':2}));
  // cornea bump
  svg.appendChild(el('path',{d:'M150,180 Q120,150 130,120 M150,180 Q120,210 130,240',fill:'none',stroke:'#4a5a6b','stroke-width':2}));
  // lens
  svg.appendChild(el('ellipse',{cx:LENSX,cy:AXIS,rx:13,ry:54,fill:'#1c3a55',stroke:'#4aa8ff','stroke-width':1.5,opacity:.85}));
  // retina (back wall)
  svg.appendChild(el('path',{d:'M'+(retinaX+30)+',96 Q'+(retinaX+10)+',180 '+(retinaX+30)+',264',
    fill:'none',stroke:'var(--retina)','stroke-width':4}));
  var t=el('text',{x:retinaX-6,y:300,fill:'#e673b0','font-size':12,'text-anchor':'middle'});t.textContent='retina';svg.appendChild(t);
  // axis
  svg.appendChild(el('line',{x1:120,y1:AXIS,x2:retinaX+24,y2:AXIS,stroke:'#33414f','stroke-width':1,'stroke-dasharray':'4 5'}));
}
function ray(x1,y1,x2,y2,extendTo){
  // line from (x1,y1) toward (x2,y2); returns y at x=extendTo
  var m=(y2-y1)/(x2-x1);
  var yEnd=y1+m*(extendTo-x1);
  svg.appendChild(el('line',{x1:x1,y1:y1,x2:extendTo,y2:yEnd,stroke:'var(--ray)','stroke-width':2}));
  return yEnd;
}
function spotOrBlur(x,yTop,yBot){
  var r=Math.abs(yTop-yBot)/2;
  if(r<3){svg.appendChild(el('circle',{cx:x,cy:AXIS,r:3.5,fill:'var(--ok)'}));}
  else{svg.appendChild(el('circle',{cx:x,cy:AXIS,r:r,fill:'none',stroke:'var(--bad)','stroke-width':1.5,opacity:.8}));
       svg.appendChild(el('circle',{cx:x,cy:AXIS,r:r,fill:'var(--bad)',opacity:.12}));}
  return r;
}

function render(){
  clear();
  var corr=document.getElementById('corr').checked;
  var slider=+document.getElementById('len').value; // -26..26 (negative=short eye=hyperope)
  var retinaX, fx, blurD, label, lensSign=0;

  if(mode==='emm'){
    retinaX=FX0; fx=FX0; document.getElementById('sliderRow').style.opacity=.4;
    document.getElementById('len').disabled=true;
  }else{
    document.getElementById('sliderRow').style.opacity=1;document.getElementById('len').disabled=false;
    if(mode==='myopia'){slider=Math.max(4,Math.abs(slider))*1; retinaX=FX0+slider*3; lensSign=-1;}
    else if(mode==='hyperopia'){slider=Math.max(4,Math.abs(slider)); retinaX=FX0-slider*3; lensSign=1;}
    else {retinaX=FX0; } // astig handled separately
    fx=FX0;
    if(corr){fx=retinaX;} // lens moves focus onto retina
  }

  if(mode==='astig'){ drawEyeBody(FX0); renderAstig(corr); return; }

  drawEyeBody(retinaX);
  // incoming parallel rays to the lens edges
  svg.appendChild(el('line',{x1:120,y1:AXIS-46,x2:LENSX,y2:AXIS-46,stroke:'var(--ray)','stroke-width':2}));
  svg.appendChild(el('line',{x1:120,y1:AXIS+46,x2:LENSX,y2:AXIS+46,stroke:'var(--ray)','stroke-width':2}));
  // refracted rays converging to the focus, extended to the retina
  var topAtRet=ray(LENSX,AXIS-46,fx,AXIS,retinaX);
  var botAtRet=ray(LENSX,AXIS+46,fx,AXIS,retinaX);
  svg.appendChild(el('circle',{cx:fx,cy:AXIS,r:3.5,fill:'var(--ok)'}));
  var blurR=spotOrBlur(retinaX,topAtRet,botAtRet);

  // spectacle lens if corrected
  if(corr && lensSign!==0) drawSpectacle(lensSign);

  // numbers
  var errD=Math.round((Math.abs(retinaX-FX0)/3)/3*10)/10; // rough dioptres
  var axmm=Math.round((24+(retinaX-FX0)/3*0.3)*10)/10;
  var focusWhere = fx<retinaX-3?'in front of the retina':(fx>retinaX+3?'behind the retina':'on the retina');
  var sharp = blurR<3;
  document.getElementById('readout').innerHTML =
    '<b>'+({myopia:'Myopia',hyperopia:'Hyperopia',emm:'Emmetropia'}[mode])+(corr?' (corrected)':'')+'.</b> '+
    (mode==='emm'?'Parallel rays from a distant object focus exactly on the retina. No correction needed.':
      'The eye focuses parallel rays '+focusWhere+', so the retinal image is '+(sharp?'sharp':'a blur circle')+'. '+
      (corr?('A '+(lensSign<0?'minus (concave)':'plus (convex)')+' spectacle lens shifts the focus onto the retina.'):
            'Add the correcting lens to fix it.'));
  document.getElementById('stats').innerHTML =
    '<span class="stat">Error ≈ <b>'+(lensSign<0?'-':'+')+errD.toFixed(1)+' D</b></span>'+
    '<span class="stat">Axial length ≈ <b>'+axmm.toFixed(1)+' mm</b></span>'+
    '<span class="stat">Correcting lens: <b>'+(mode==='emm'?'none':(lensSign<0?'concave (−)':'convex (+)'))+'</b></span>';
  // blurred letter preview
  var blurPx = sharp?0:Math.min(12,blurR/4);
  document.getElementById('Eimg').style.filter='blur('+blurPx+'px)';
  teach();
}
function renderAstig(corr){
  // two focal lines: vertical meridian focuses at fxV, horizontal at fxH; circle of least confusion between
  var fxH=FX0-26, fxV=FX0+26, retinaX=FX0;
  if(corr){fxH=FX0;fxV=FX0;}
  drawEyeBody(retinaX);
  // rays to two foci
  ray(LENSX,AXIS-46,fxH,AXIS,retinaX);ray(LENSX,AXIS+46,fxH,AXIS,retinaX);
  ray(LENSX,AXIS-30,fxV,AXIS,retinaX);ray(LENSX,AXIS+30,fxV,AXIS,retinaX);
  svg.appendChild(el('line',{x1:120,y1:AXIS-46,x2:LENSX,y2:AXIS-46,stroke:'var(--ray)','stroke-width':2}));
  svg.appendChild(el('line',{x1:120,y1:AXIS+46,x2:LENSX,y2:AXIS+46,stroke:'var(--ray)','stroke-width':2}));
  if(!corr){
    svg.appendChild(el('circle',{cx:fxH,cy:AXIS,r:3.5,fill:'#ff9d97'}));
    svg.appendChild(el('circle',{cx:fxV,cy:AXIS,r:3.5,fill:'#9ccbff'}));
    var clc=(fxH+fxV)/2;
    svg.appendChild(el('circle',{cx:clc,cy:AXIS,r:10,fill:'none',stroke:'#fff','stroke-width':1.2,opacity:.7}));
    var t=el('text',{x:clc,y:AXIS-16,fill:'#fff','font-size':11,'text-anchor':'middle'});t.textContent='circle of least confusion';svg.appendChild(t);
  }else{ svg.appendChild(el('circle',{cx:FX0,cy:AXIS,r:3.5,fill:'var(--ok)'})); }
  document.getElementById('sliderRow').style.opacity=.4;document.getElementById('len').disabled=true;
  if(corr) drawSpectacle(2); // cyl symbol
  document.getElementById('readout').innerHTML='<b>Astigmatism'+(corr?' (corrected)':'')+'.</b> '+
    (corr?'A cylindrical lens collapses the two focal lines onto one point on the retina.':
    'The two principal meridians focus at different points (the interval of Sturm). Between them sits the circle of least confusion, the blur the patient actually fixates. A cylinder is needed, not just a sphere.');
  document.getElementById('stats').innerHTML='<span class="stat">Needs a <b>cylinder</b> (toric) correction</span><span class="stat">Two line foci → <b>interval of Sturm</b></span>';
  document.getElementById('Eimg').style.filter=corr?'blur(0px)':'blur(3px)';
  teach();
}

function drawSpectacle(sign){
  var x=92;
  if(sign<0){ // concave / minus: thin centre
    svg.appendChild(el('path',{d:'M'+x+',120 Q'+(x+9)+',180 '+x+',240 L'+(x-12)+',240 Q'+(x-3)+',180 '+(x-12)+',120 Z',
      fill:'#10324f',stroke:'#4aa8ff','stroke-width':1.5,opacity:.9}));
    sym('−',x-3);
  } else if(sign===2){ // cylinder
    svg.appendChild(el('rect',{x:x-12,y:120,width:18,height:120,rx:4,fill:'#2a1f45',stroke:'#a371f7','stroke-width':1.5,opacity:.9}));
    sym('cyl',x-3);
  } else { // convex / plus: thick centre
    svg.appendChild(el('path',{d:'M'+x+',120 Q'+(x-9)+',180 '+x+',240 L'+(x-12)+',240 Q'+(x+3)+',180 '+(x-12)+',120 Z',
      fill:'#10324f',stroke:'#4aa8ff','stroke-width':1.5,opacity:.9}));
    sym('+',x-3);
  }
  function sym(s,sx){var t=el('text',{x:sx,y:106,fill:'#9ccbff','font-size':14,'text-anchor':'middle','font-weight':'700'});t.textContent=s;svg.appendChild(t);}
}

var TEACH={
 emm:'<b>Emmetropia</b> means the focal point of the relaxed eye sits exactly on the retina. The total power of cornea plus lens is matched to the axial length. Far point is at infinity.',
 myopia:'<b>Myopia (nearsighted).</b> The eye is too powerful or too long, so light focuses in front of the retina. Corrected with a <b>minus (concave)</b> lens that diverges light. Far point is at a finite distance in front of the eye; near objects are seen clearly.',
 hyperopia:'<b>Hyperopia (farsighted).</b> The eye is too weak or too short, so light would focus behind the retina. Corrected with a <b>plus (convex)</b> lens. Young hyperopes can accommodate to clear it, which is why latent hyperopia hides on a manifest refraction.',
 astig:'<b>Astigmatism.</b> The cornea (or lens) has different power in different meridians, so there is no single focus, but two focal lines separated by the interval of Sturm. The circle of least confusion is the point of best overall focus. Requires a <b>cylindrical</b> lens; the axis matters.'
};
function teach(){document.getElementById('teach').innerHTML=TEACH[mode];}

document.querySelectorAll('.mode').forEach(function(b){
  b.addEventListener('click',function(){
    mode=b.dataset.mode;
    document.querySelectorAll('.mode').forEach(function(x){x.classList.toggle('on',x===b);});
    document.getElementById('corr').checked=false;
    document.getElementById('len').value=mode==='hyperopia'?-12:12;
    render();
  });
});
document.getElementById('len').addEventListener('input',render);
document.getElementById('corr').addEventListener('change',render);
// init
document.querySelector('.mode[data-mode="myopia"]').classList.add('on');
mode='myopia';document.getElementById('len').value=12;render();
</script>
</body>
</html>
