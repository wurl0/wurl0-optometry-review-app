<script type="text/markdown" id="md-jul">
# July Self-Review Plan
**Target checkpoint:** All-subjects preboard, ~July 30
**Goal:** 75%+ on every subject A through H before that sitting
**Written exam:** Sept 28 to 30 | **Practical exam:** Oct 5

---

## The Mindset This Month (read this first)

Your day review is teaching you these subjects all day, Mon to Sat, 7am to 6pm. That is the heavy lifting. Your self-review job at night is small on purpose: **test yourself and patch the holes it leaves.** You are not re-learning each subject from zero at night. That reframe is what keeps July sustainable.

So the load is light by design:

| Slot | When | Length | Use it for |
|---|---|---|---|
| Weeknight | Mon to Sat, after Day review | 60 to 90 min (skippable) | Take a Preboard or Subject-Exam on the day's review subject, note misses |
| Sunday | Free day | Your call | Either a 2 to 3 hr catch-up read, OR a full rest day. Not mandatory. |

That is roughly 8 to 12 self-review hours a week, not 20. Enough to hit 75%+ if the daytime the day review is landing (it is).

**On Sunday:** no, it is not required. If your week's evenings went well and the scores are climbing, take Sunday off with a clear conscience. Use Sunday only when a subject is behind or you want an unhurried deep read. Rest is part of the plan, not a failure of it.

Daytime Your practical lab is your practical exam prep. Do not duplicate it at night. At night, only reinforce the procedure logic from the notebook.

### Burnout guardrails
- A skipped evening is fine. Missing one night does not undo a week.
- Two green subjects a week is a great pace. One is still forward motion.
- If a subject scores under 60% twice, that is data, not a verdict. Log it and move on; you will circle back in Wk 5.
- One full rest day a week, minimum. Sunday is the natural choice.

---

## The Per-Subject Loop

Use the five layers in this order. Do not skip to the exam first.

1. **Reviewer** — read the whole subject once. This is your source of reading.
2. **Strategy** — rules, mnemonics, board traps, Fast Picks. Read while the Reviewer is fresh.
3. **Subject-Exam** — take it in Full mode. Log the score. Write down every missed topic.
4. **Preboards Set 1** (2025) — take it, log the score.
5. **Preboards Set 2** (2024) — take it, log the score.
6. **Re-drill** — go back only to the Reviewer sections behind your missed items. Retake the exam. A subject is done when you clear 75%+ twice.

Read on Sunday (steps 1 to 2). Test on weeknights (steps 3 to 6).

---

## Sequence and Weekly Calendar

Order: **A** (foundation, started) then the four 15% subjects **B, C, D, F**, then the three 10% subjects **E, G, H**. Match your evening subject to whatever covered that day when you can.

| Week | Dates | Focus | Evenings | Sunday (optional) |
|---|---|---|---|---|
| Wk 1 | Jul 1 to 5 | Close out A | Retake A exam, note misses, re-drill to 75% | Only if A not at 75% |
| Wk 2 | Jul 6 to 12 | B — PhysOptics + BV (15%) | B exam + Preboards, patch misses | Read B Reviewer if B lags |
| Wk 3 | Jul 13 to 19 | C — Primary Care (15%) | C exams; tie C3/C4/C5 to Practical lab | Read C Reviewer if behind |
| Wk 4 | Jul 20 to 26 | D then F (15% each) | D exams (drill math), F exams | Split D and F reading |
| Wk 5 | Jul 27 to 30 | E, G, H + rehearsal | Quick Preboards on E/G/H, then a timed Mock Board | Weak-area cleanup only |

If day review taught a subject well and your first Preboard is already 75%+, that subject is done. Spend saved time resting or on subjects below the line.

---

## Practical Track (15 min per weeknight)

At night, reinforce the reasoning so the practical and written exam feed each other.

| Practical skill | Notebook source |
|---|---|
| Case history, VA, IPD, NPC, cover test, pupils, Hirschberg | C3 Preliminary Examination |
| Retinoscopy, ophthalmoscopy, slit lamp, keratometry, Javal | C4 Objective Examination |
| Fogging, astig dial, JCC, duochrome, binocular balance | C5 Subjective Examination |
| OEP 21-step phorometry, NRA/PRA, phoria tests | C5 + C6 Management |
| VT, Parks 3-step, Brock string, criteria | C7 Vision Therapy |
| Transposition, Prentice, neutralization | D2 Dispensing |

Nightly drill: pick one procedure you did in day review lab that day and write its sequence from memory on paper. Check against the note.

---

## Jul 30 Preboard Readiness Checklist

- A cleared 75%+ (rebuilt from the 55% start)
- B, C, D, F each cleared 75%+ (the 15% subjects)
- E, G, H each cleared 75%+
- Both Mock Boards taken full and timed, 75%+ overall
- Weak-area list emptied
- One practical procedure drilled from memory per day

<script type="text/markdown" id="md-aug">
# August to Exam Plan
**Written exam:** Sept 28 to 30, 2026 · **Practical exam:** Oct 5, 2026
**Starts after** the day review preboard (~Jul 30).
**Standing goal:** hold every subject at 75%+, then push the weak ones higher.

---

## The Shape of These Two Months

July was reinforcement around day review. August is the opposite: day review is done, so your days are your own. The plan paces it so you peak in late September, not August.

| Phase | Dates | Gear | Daily cap |
|---|---|---|---|
| Self-review | Aug 1 to 31 | Fix weak subjects, cement strong ones | 4 to 5 hrs |
| Taper | Sep 1 to 14 | Questions and high-yield notes only | 3 hrs |
| Wind-down | Sep 15 to 21 | One subject a day, notes only | 1 to 2 hrs |
| Rest | Sep 22 to 27 | High-yield glance, protect your head | Light |
| Written exam | Sep 28 to 30 | Execute | — |
| Practical prep | Oct 1 to 4 | Hands-on drills only | — |
| Practical exam | Oct 5 | Execute | — |

The key idea: **you should be doing less in late September than in August, not more.** Cramming lowers scores. The taper is strategy.

---

## Phase 1: August Self-Review

Open the Progress Tracker first and sort subjects into three piles:

- **Green (75%+):** maintain. One Preboard pass per week.
- **Amber (60 to 74%):** the main work. Full loop, then re-drill misses.
- **Red (under 60%):** priority. Reviewer re-read plus both Preboards plus targeted notes.

### Weekly rhythm (5 to 6 days on, 1 full rest day)

| Day | Block 1 (90 min) | Block 2 (60 min) | Block 3 (60 min, optional) |
|---|---|---|---|
| Mon to Fri | Reviewer + Strategy of the day's subject | Preboard or exam on it | A red-pile subject |
| Saturday | Timed Mock Board | Review every missed item | — |
| Sunday | Rest | Rest | Rest |

### Four-week subject map

| Week | Focus | Why |
|---|---|---|
| Aug 1 to 7 | Your two weakest from the preboard | Biggest gaps while energy is highest |
| Aug 8 to 14 | 15% subjects (B, C, D, F) not yet green | Most items, most return |
| Aug 15 to 21 | 10% subjects (A, E, G, H) not yet green | Close the smaller gaps |
| Aug 22 to 31 | Weak areas + full Mock Boards | Whatever is still amber or red |

Build a high-yield sheet as you go: 3 to 5 facts a day you keep missing. This becomes your only reading in the final rest week.

---

## Phase 2: Taper (Sep 1 to 14)

No new content. Questions and notes only, 3 hrs max.

- **Daily:** one Preboard or exam on your lowest-scoring subject.
- **Every 3 days:** one timed Mock Board.
- **Read:** your high-yield sheet, not full Reviewers.
- **Rest:** two full days off across these two weeks.

Target by Sep 14: every subject green, Mock Board at or above 80%.

---

## Phase 3: Wind-down (Sep 15 to 21)

One subject a day, 1 to 2 hrs, notes and Strategy cards only. Order: A, then E, G, H, then D, F, then B, C. Stay warm, do not learn new material.

---

## Phase 4: Near-Full Rest (Sep 22 to 27)

High-yield sheet only. Sleep, eat, arrive rested. Confirm exam logistics. Sept 27 evening: light glance at H numbers and D formulas, then stop.

---

## Phase 6: Practical Prep and Exam (Oct 1 to 5)

The practical is 30% of the total. Drill execution only:

| Area | Weight | Drill |
|---|---|---|
| Clinical incl. DPA + CL | 40% | DPA protocol, CL fitting, documentation |
| Subjective Examination | 20% | Full 21-step, phoria and accommodation tests |
| Objective Examination | 20% | Retinoscopy, ophthalmoscopy, biomicroscopy, tonometry |
| Ophthalmic Dispensing | 20% | Transposition, neutralization, frame adjustments |

---

## Guardrails

- One full rest day every week, no exceptions.
- If a day feels like a wall, do questions only, or stop.
- Progress is the tracker filling up, not hours logged.
- You need every subject over 75% and a rested head on Sept 28. Not perfection.
</script>

    document.getElementById('tabJul').classList.toggle('on',which==='jul');
